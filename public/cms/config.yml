# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: Jurislav/voidlesstale.github.io
  branch: main
  base_url: https://sveltia-cms-auth.voidlesstale.workers.dev

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: site
    label: Site Content
    files:
      - name: settings
        label: Site Settings
        file: src/content/settings/settings.yml
        fields:
          - { label: Site Title, name: site_title, widget: string }
          - { label: Site Tagline, name: site_tagline, widget: string }
          - { label: Footer Text, name: footer_text, widget: text }
          - label: Navigation
            name: navigation
            widget: list
            summary: "{{fields.label}} -> {{fields.href}}"
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Link, name: href, widget: string }
          - label: Design
            name: design
            widget: object
            fields:
              - { label: Accent Color, name: accent, widget: color }
              - { label: Secondary Accent, name: accent_soft, widget: color }
              - { label: Text Color, name: text, widget: color }
              - { label: Muted Text Color, name: muted, widget: color }
              - { label: Page Background Start, name: page_bg_start, widget: color }
              - { label: Page Background End, name: page_bg_end, widget: color }
              - { label: Panel Background, name: panel_bg, widget: string }
              - { label: Strong Panel Background, name: panel_strong_bg, widget: string }
              - { label: Border Color, name: border, widget: string }
              - { label: Left Glow Color, name: glow_left, widget: string }
              - { label: Right Glow Color, name: glow_right, widget: string }
              - { label: Max Width, name: max_width, widget: string }
              - { label: Card Radius, name: card_radius, widget: string }
              - { label: Card Padding, name: card_padding, widget: string }
              - { label: Panel Padding, name: panel_padding, widget: string }
      - name: home
        label: Homepage
        file: src/content/home/home.yml
        fields:
          - { label: SEO Title, name: seo_title, widget: string }
          - { label: Description, name: description, widget: text }
          - { label: Eyebrow, name: eyebrow, widget: string }
          - { label: Headline, name: headline, widget: string }
          - { label: Intro, name: intro, widget: text }
          - { label: Primary CTA Label, name: primary_cta_label, widget: string }
          - { label: Primary CTA Link, name: primary_cta_href, widget: string }
          - { label: Secondary CTA Label, name: secondary_cta_label, widget: string }
          - { label: Secondary CTA Link, name: secondary_cta_href, widget: string }
          - { label: Feature Section Eyebrow, name: feature_section_eyebrow, widget: string }
          - label: Feature Cards
            name: feature_cards
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Text, name: text, widget: text }
          - { label: Latest Section Eyebrow, name: latest_section_eyebrow, widget: string }
          - { label: Latest Section Title, name: latest_section_title, widget: string }
          - label: Layout
            name: layout
            widget: object
            fields:
              - { label: Hero Columns, name: hero_columns, widget: string }
              - { label: Feature Columns, name: feature_columns, widget: number, min: 1, max: 4, value_type: int }
              - { label: Latest Columns, name: latest_columns, widget: number, min: 1, max: 4, value_type: int }
              - { label: Card Minimum Height, name: card_min_height, widget: string }
          - label: Backgrounds
            name: backgrounds
            widget: object
            fields:
              - { label: Hero Section Background, name: hero_section, widget: string }
              - { label: Latest Section Background, name: latest_section, widget: string }
              - { label: Feature Card Background, name: feature_cards, widget: string }

  - name: pages
    label: Pages
    label_singular: Page
    folder: src/content/pages
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Navigation Label, name: navLabel, widget: string, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: devlog
    label: Devlog
    label_singular: Post
    folder: src/content/devlog
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Publish Date, name: pubDate, widget: datetime }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }
