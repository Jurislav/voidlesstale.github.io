# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: Jurislav/voidlesstale.github.io
  branch: main
  # For Cloudflare-hosted production, either:
  # 1. sign in with a GitHub personal access token, or
  # 2. deploy the Worker in cloudflare/sveltia-cms-auth and set base_url below.
  # base_url: https://sveltia-cms-auth.<your-subdomain>.workers.dev

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: devlog
    label: Devlog
    label_singular: Post
    folder: src/content/devlog
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Publish Date, name: pubDate, widget: datetime }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }
